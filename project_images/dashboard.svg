<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GlacierGuard dashboard preview</title>
  <desc id="desc">Stylized dark dashboard with map and side panels</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1218"/>
      <stop offset="100%" stop-color="#151d28"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#2a3544" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- top bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#0e1620" stroke="#2a3d52" stroke-width="1"/>
  <text x="40" y="36" fill="#e8f0f8" font-family="system-ui, Segoe UI, sans-serif" font-size="20" font-weight="600">GlacierGuard</text>
  <rect x="920" y="16" width="100" height="24" rx="4" fill="#1e3a5f" stroke="#3d6fa8" stroke-width="1"/>
  <text x="948" y="33" fill="#9ec5ff" font-family="system-ui, sans-serif" font-size="11">Live view</text>
  <!-- left panel -->
  <rect x="24" y="80" width="280" height="571" rx="8" fill="#111a24" stroke="#2a3d52" stroke-width="1"/>
  <text x="44" y="118" fill="#8fa3b8" font-family="system-ui, sans-serif" font-size="11" letter-spacing="0.08em">LAKE STATUS</text>
  <rect x="44" y="132" width="240" height="72" rx="6" fill="#15202e" stroke="#2f4a63"/>
  <rect x="44" y="216" width="240" height="72" rx="6" fill="#15202e" stroke="#2f4a63"/>
  <rect x="44" y="300" width="240" height="72" rx="6" fill="#15202e" stroke="#2f4a63"/>
  <!-- map -->
  <rect x="328" y="80" width="848" height="571" rx="8" fill="#0d1824" stroke="#2a3d52" stroke-width="1"/>
  <ellipse cx="720" cy="360" rx="220" ry="140" fill="#1a3048" opacity="0.6"/>
  <path d="M 520 420 Q 720 280 920 400" fill="none" stroke="#4a8fd4" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <circle cx="680" cy="320" r="10" fill="#5cb88a" stroke="#8fd4b8" stroke-width="2"/>
  <circle cx="820" cy="380" r="8" fill="#d4a85c" stroke="#e8c98a" stroke-width="2"/>
  <text x="348" y="112" fill="#8fa3b8" font-family="system-ui, sans-serif" font-size="11" letter-spacing="0.08em">MAP  HIMALAYA AOI</text>
  <!-- legend chip -->
  <rect x="980" y="96" width="180" height="88" rx="6" fill="#111a24" stroke="#2a3d52"/>
  <text x="996" y="124" fill="#cfd8e3" font-family="system-ui, sans-serif" font-size="10">Risk tier</text>
  <rect x="996" y="136" width="12" height="12" rx="2" fill="#5cb88a"/>
  <text x="1016" y="147" fill="#9fb0c4" font-family="system-ui, sans-serif" font-size="10">Watch</text>
  <rect x="996" y="156" width="12" height="12" rx="2" fill="#d4a85c"/>
  <text x="1016" y="167" fill="#9fb0c4" font-family="system-ui, sans-serif" font-size="10">Elevated</text>
</svg>
